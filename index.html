<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>退勤記録</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#222222" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <main class="app">
    <header>
      <h1>退勤記録</h1>
      <p class="subtitle">退勤時間・実働時間・残業時間を保存</p>
    </header>

    <section class="card">
      <button id="recordBtn" class="primary-btn">今の時刻で退勤を記録</button>

      <div class="manual-area">
        <label for="manualTime">時刻を指定して記録</label>
        <div class="manual-row">
          <input id="manualTime" type="time" />
          <button id="manualRecordBtn">記録</button>
        </div>
      </div>

      <p class="rule">
        14:00まで：実働8.5時間 / 残業0時間<br>
        14:00を超えたら30分ごとに +0.5時間
      </p>
    </section>

    <section class="summary card">
      <h2>今月の合計</h2>
      <div class="summary-grid">
        <div>
          <span class="label">実働</span>
          <strong id="totalWork">0</strong><span>時間</span>
        </div>
        <div>
          <span class="label">残業</span>
          <strong id="totalOvertime">0</strong><span>時間</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="list-head">
        <h2>記録一覧</h2>
        <button id="clearAllBtn" class="danger-outline">全削除</button>
      </div>
      <ul id="recordList" class="record-list"></ul>
      <p id="emptyText" class="empty">まだ記録がありません。</p>
    </section>
  </main>

  <template id="recordTemplate">
    <li class="record-item">
      <div class="record-main">
        <div class="record-date"></div>
        <div class="record-values"></div>
      </div>
      <div class="record-actions">
        <input class="edit-time" type="time" />
        <button class="save-btn">変更</button>
        <button class="delete-btn">削除</button>
      </div>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
