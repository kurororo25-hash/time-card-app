<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>退勤記録</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <main class="app">
    <header>
      <h1>退勤記録</h1>
      <p id="todayLabel" class="today"></p>
    </header>

    <button id="clockOutBtn" class="clock-out" type="button">今の時刻で退勤</button>

    <section class="month-nav" aria-label="表示月の変更">
      <button id="prevMonth" type="button" aria-label="前の月">‹</button>
      <h2 id="monthTitle"></h2>
      <button id="nextMonth" type="button" aria-label="次の月">›</button>
    </section>

    <section id="summary" class="summary"></section>
    <section id="recordList" class="record-list" aria-live="polite"></section>
  </main>

  <dialog id="editDialog">
    <form id="editForm" method="dialog">
      <h2>記録を編集</h2>
      <input id="editId" type="hidden">

      <label>年月日
        <input id="editDate" type="date" required>
      </label>
      <p id="editWeekday" class="weekday-preview"></p>

      <label>退勤時刻
        <input id="editTime" type="time" step="60" required>
      </label>

      <div id="editCalculation" class="edit-calculation"></div>

      <div class="dialog-actions">
        <button id="cancelEdit" type="button" class="secondary">キャンセル</button>
        <button type="submit">保存</button>
      </div>
      <button id="deleteRecord" type="button" class="danger">この記録を削除</button>
    </form>
  </dialog>

  <script src="script.js?v=3"></script>
</body>
</html>
